name: Standardise CSVs

on:
  schedule:
    - cron: "00 22 * * *"
  workflow_dispatch:

env:
  SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}

concurrency:
  group: standardise-csvs
  cancel-in-progress: true

jobs:
  standardise:
    runs-on: ubuntu-latest
    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ steps.app-token.outputs.token }}

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Check app identity
        run: |
          curl -s -H "Authorization: token ${{ steps.app-token.outputs.token }}" https://api.github.com/user | grep login

      - name: Configure git
        run: |
          git config user.name "github-actions-bot"
          git config user.email "noreply@github.com"

      - name: Run standardise script
        run: python .github/scripts/standardise_csvs.py

      - name: Commit and push if changed
        run: |
          git add collection/ pipeline/
          if git diff --staged --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "Standardise row ordering and line endings in CSVs"
          git push origin HEAD:main

      - name: Notify slack failure
        if: failure() && github.ref == 'refs/heads/main'
        uses: digital-land/github-action-slack-notify-build@main
        with:
          channel: planning-data-alerts
          status: FAILED
          color: danger
