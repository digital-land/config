name: Manage Conservation Area Data

# The scheduled CA deduplication now runs inside config-evening-pipeline.yml.
# This workflow is kept for ad-hoc manual runs; it also commits directly to main.
on:
  workflow_dispatch:

jobs:
  manage-ca-data:
    runs-on: ubuntu-latest

    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ steps.app-token.outputs.token }}

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install rapidfuzz

      - name: Run deduplicate CA geographies script
        timeout-minutes: 10
        run: |
          echo "Starting deduplicate script..."
          python .github/scripts/deduplicate-ca-geogs.py
          echo "Deduplicate script completed"

      - name: Run retire MHCLG CA data script
        timeout-minutes: 10
        run: |
          echo "Starting retire script..."
          python .github/scripts/retire-mhclg-ca-data.py
          echo "Retire script completed"

      - name: Commit and push to main
        run: |
          git config user.name "github-actions-bot"
          git config user.email "noreply@github.com"

          git add pipeline/conservation-area/old-entity.csv \
                  collection/conservation-area/endpoint.csv \
                  collection/conservation-area/source.csv \
                  collection/conservation-area/old-resource.csv

          if git diff --staged --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "Manage conservation area data"
          git pull --rebase origin main
          git push origin HEAD:main

      - name: Summary
        run: |
          echo "### Manage Conservation Area Data" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Scripts executed:" >> $GITHUB_STEP_SUMMARY
          echo "- Deduplicate CA geographies" >> $GITHUB_STEP_SUMMARY
          echo "- Retire MHCLG CA data" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Changes committed directly to main (if any)." >> $GITHUB_STEP_SUMMARY
