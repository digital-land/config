name: Manage Conservation Area Data

on:
  workflow_dispatch:

jobs:
  manage-ca-data:
    runs-on: ubuntu-latest

    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ steps.app-token.outputs.token }}

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install rapidfuzz

      - name: Run deduplicate CA geographies script
        timeout-minutes: 10
        run: |
          echo "Starting deduplicate script..."
          python .github/scripts/deduplicate-ca-geogs.py
          echo "Deduplicate script completed"

      - name: Run retire MHCLG CA data script
        timeout-minutes: 10
        run: |
          echo "Starting retire script..."
          python .github/scripts/retire-mhclg-ca-data.py
          echo "Retire script completed"

      - name: Commit and create PR
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          BRANCH_NAME="manage-ca-data-$(date +%Y%m%d-%H%M)"

          git config user.name "github-actions-bot"
          git config user.email "noreply@github.com"

          # Check if there are changes
          if git diff --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git checkout -b "$BRANCH_NAME"
          git add pipeline/conservation-area/old-entity.csv \
                  collection/conservation-area/endpoint.csv \
                  collection/conservation-area/source.csv \
                  collection/conservation-area/old-resource.csv

          # Double-check there are staged changes
          if git diff --staged --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "Manage conservation area data"

          git push origin "$BRANCH_NAME"

          # Create PR
          gh pr create --title "Manage conservation area data" \
            --body "This PR contains automatic updates to conservation area data:

          ## Changes

          **Deduplicate Conservation Area Geographies:**
          - Complete matches (100% geometry overlap)
          - Single matches with >85% name similarity

          **Retire MHCLG Conservation Area Data:**
          - Mark endpoints and sources as retired
          - Track retired resources

          This PR was automatically created via the Manage Conservation Area Data workflow.

          **Triggered by:** @${{ github.actor }}

          Please review and merge if appropriate." \
                                --base main \
                                --head "$BRANCH_NAME"

      - name: Summary
        run: |
          echo "### Manage Conservation Area Data" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Scripts executed:" >> $GITHUB_STEP_SUMMARY
          echo "- Deduplicate CA geographies" >> $GITHUB_STEP_SUMMARY
          echo "- Retire MHCLG CA data" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Check above for PR creation details." >> $GITHUB_STEP_SUMMARY
