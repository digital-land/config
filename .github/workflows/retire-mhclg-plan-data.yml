name: Retire MHCLG Plan Data

# The scheduled plan-data retirement now runs inside config-evening-pipeline.yml.
# This workflow is kept for ad-hoc manual runs; it also commits directly to main.
on:
  workflow_dispatch:

jobs:
  retire-plan-data:
    runs-on: ubuntu-latest

    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ steps.app-token.outputs.token }}

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Run retire MHCLG plan data script
        id: retire-script
        timeout-minutes: 10
        run: |
          echo "Starting retire MHCLG plan data script..."
          SUMMARY=$(python .github/scripts/retire-mhclg-plan-data.py)
          echo "Retire script completed"
          {
            echo "summary<<EOF"
            echo "$SUMMARY"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Commit and push to main
        run: |
          git config user.name "github-actions-bot"
          git config user.email "noreply@github.com"

          git add pipeline/local-plan/old-entity.csv

          if git diff --staged --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "Retire MHCLG plan data"
          git pull --rebase origin main
          git push origin HEAD:main

      - name: Summary
        run: |
          echo "### Retire MHCLG Plan Data" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Script executed:" >> $GITHUB_STEP_SUMMARY
          echo "- Retire MHCLG plan data script" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Datasets processed:" >> $GITHUB_STEP_SUMMARY
          echo "- local-plan" >> $GITHUB_STEP_SUMMARY
          echo "- plan-timetable" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Changes committed directly to main (if any)." >> $GITHUB_STEP_SUMMARY
