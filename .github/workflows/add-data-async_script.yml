name: Add Data From Async API

on:
  repository_dispatch:
    types: [add-data-async-script]
  workflow_dispatch:
    inputs:
      request_id:
        description: 'Request ID from async API'
        required: true
        type: string
      branch:
        description: 'Git branch to use (optional)'
        required: false
        type: string
      api_base_url:
        description: 'API environment'
        required: false
        type: choice
        default: 'http://staging-pub-async-api-lb-12493311.eu-west-2.elb.amazonaws.com'
        options:
          - 'http://development-pub-async-api-lb-69142969.eu-west-2.elb.amazonaws.com'
          - 'http://staging-pub-async-api-lb-12493311.eu-west-2.elb.amazonaws.com'
      retire_endpoints:
        description: 'Comma-separated endpoint strings to retire (optional)'
        required: false
        type: string
      test:
        description: 'Run in test mode (creates draft PR)'
        required: false
        type: boolean
        default: false

jobs:
  fetch-and-append:
    runs-on: ubuntu-latest

    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ steps.app-token.outputs.token }}

      - name: Run add-data script
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          REQUEST_ID: ${{ github.event.client_payload.request_id || github.event.inputs.request_id }}
          BRANCH_PARAM: ${{ github.event.client_payload.branch || github.event.inputs.branch }}
          TRIGGERED_BY: ${{ github.event.client_payload.triggered_by }}
          API_BASE_URL: ${{ github.event.client_payload.api_base_url || github.event.inputs.api_base_url || vars.ASYNC_API_BASE_URL }}
          RETIRE_ENDPOINTS: ${{ github.event.client_payload.retire_endpoints || github.event.inputs.retire_endpoints }}
          TEST_MODE: ${{ github.event.inputs.test }}
        run: |
          # Get user email for triggered_by if not provided via repository_dispatch
          if [ -z "$TRIGGERED_BY" ]; then
            TRIGGERED_BY=$(gh api user -q .email)
          fi
          
          ARGS=(
            --request-id "$REQUEST_ID"
            --triggered-by "$TRIGGERED_BY"
          )

          if [ -n "$BRANCH_PARAM" ]; then
            ARGS+=(--branch "$BRANCH_PARAM")
          fi

          if [ -n "$API_BASE_URL" ]; then
            ARGS+=(--api-base-url "$API_BASE_URL")
          fi

          if [ -n "$RETIRE_ENDPOINTS" ]; then
            ARGS+=(--retire-endpoints "$RETIRE_ENDPOINTS")
          fi

          if [ "$TEST_MODE" = "true" ]; then
            ARGS+=(--test)
          fi

          python3 bin/add_data_async.py "${ARGS[@]}"
